<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture Mundial 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a237e;
            --secondary: #ffffff;
            --accent: #d32f2f;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1a1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 20px 15px;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .app-container { max-width: 600px; margin: 0 auto; }
        
        .header {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            color: var(--secondary);
            padding: 30px 25px;
            border-radius: 24px 24px 0 0;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: none;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        .header h1 { font-size: 1.6rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 0.85rem; opacity: 0.9; font-weight: 400; letter-spacing: 1px; }
        
        .outfit-selector { margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        .outfit-selector label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; opacity: 0.9; }
        .select-outfit {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4);
            padding: 8px 15px; border-radius: 30px; font-weight: 600; cursor: pointer; outline: none;
            font-family: 'Inter', sans-serif; transition: all 0.3s ease;
        }
        .select-outfit:hover { background: rgba(255,255,255,0.3); }
        .select-outfit option { color: #333; background: white; }
        
        .matches-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 0 0 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .grupo-titulo {
            margin: 15px 20px 5px 20px; padding: 8px 15px; 
            font-weight: 800; color: var(--primary); font-size: 0.8rem; 
            letter-spacing: 2px; text-transform: uppercase;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }
        .grupo-titulo:first-child { margin-top: 0; }
        .grupo-titulo.eliminacion { 
            background: var(--primary); color: white; text-align: center; font-size: 0.9rem; 
            border-left: none; border-radius: 12px; margin: 25px 20px 10px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .match-card { 
            margin: 8px 15px; padding: 15px 20px; 
            background: rgba(255, 255, 255, 0.65); 
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .match-card:hover { 
            transform: translateY(-4px) scale(1.01); 
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
        }
        
        .teams-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        .team-name { 
            font-weight: 700; font-size: 0.9rem; color: #333;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .local-name { text-align: right; flex: 1; }
        .visitante-name { text-align: left; flex: 1; }

        .center-flags { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        .team-logo { 
            font-size: 1.5rem; line-height: 1; 
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            width: 30px; text-align: center;
        }
        
        .score-box {
            padding: 4px 10px; font-size: 0.75rem; font-weight: 800; 
            color: var(--primary); background: white; border-radius: 20px; 
            border: 2px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-width: 35px; text-align: center;
        }
        
        .match-details { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.65rem; color: #666; padding: 0 5px; font-weight: 500; }
        .match-status { font-weight: 700; color: var(--accent); text-transform: uppercase; font-size: 0.6rem; margin-top: 6px; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

        };

        function aplicarOutfit(equipo) {
            const estilo = disenos[equipo];
            if (!estilo) return;
            const root = document.documentElement;
            root.style.setProperty('--primary', estilo.p);
            root.style.setProperty('--secondary', estilo.s);
            root.style.setProperty('--accent', estilo.a);
            root.style.setProperty('--bg-gradient', estilo.bg);
            localStorage.setItem('outfit_mundial', equipo);
        }

        function renderizarFixture() {
            const contenedor = document.getElementById('matches');
            let htmlTotal = '';

            fixtureOficial.forEach(grupo => {
                const claseTitulo = grupo.esEliminacion ? 'grupo-titulo eliminacion' : 'grupo-titulo';
                htmlTotal += '<div class="' + claseTitulo + '">' + grupo.grupo + '</div>';
                
                grupo.partidos.forEach(partido => {
                    const fechaFormateada = new Date(partido.fecha).toLocaleString('es-ES', { 
                        weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
                    });

                    htmlTotal += '<div class="match-card">' +
                        '<div class="teams-row">' +
                            '<div class="team-name local-name">' + partido.local.nombre + '</div>' +
                            '<div class="center-flags">' +
                                '<span class="team-logo">' + partido.local.bandera + '</span>' +
                                '<div class="score-box">VS</div>' +
                                '<span class="team-logo">' + partido.visitante.bandera + '</span>' +
                            '</div>' +
                            '<div class="team-name visitante-name">' + partido.visitante.nombre + '</div>' +
                        '</div>' +
                        '<div class="match-details">' +
                            '<span>📅 ' + fechaFormateada + 'hs</span>' +
                            '<span>🏟️ ' + partido.estadio + '</span>' +
                        '</div>' +
                        '<div class="match-status">Por jugar</div>' +
                    '</div>';
                });
            });

            contenedor.innerHTML = htmlTotal;
        }

        window.onload = function() {
            const outfitGuardado = localStorage.getItem('outfit_mundial');
            if (outfitGuardado) {
                document.getElementById('color-picker').value = outfitGuardado;
                aplicarOutfit(outfitGuardado);
            }
            renderizarFixture();
        };
    </script>
</body>
</html>
