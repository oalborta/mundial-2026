<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 26 | Mundial 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #1a237e; --secondary: #ffffff; --accent: #d32f2f;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); --text-main: #1a1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; padding: 15px; transition: background 0.6s ease; }
        .app-container { max-width: 600px; margin: 0 auto; margin-bottom: 80px; }
        
        .header { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--secondary); padding: 30px 25px; border-radius: 24px 24px 0 0; text-align: center; border: 1px solid rgba(255, 255, 255, 0.3); border-bottom: none; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15); }
        .app-logo { max-width: 180px; width: 100%; height: auto; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        .header p { font-size: 0.85rem; opacity: 0.9; letter-spacing: 1px; }
        
        .outfit-selector { margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        .outfit-selector label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .select-outfit { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 8px 15px; border-radius: 30px; font-weight: 600; cursor: pointer; outline: none; }
        .select-outfit option { color: #333; background: white; }
        
        .matches-container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 0 0 24px 24px; border: 1px solid rgba(255, 255, 255, 0.3); border-top: 1px solid rgba(255, 255, 255, 0.1); padding: 20px 0; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15); }

        .vitrina-titulo { text-align: center; font-size: 1.1rem; font-weight: 800; color: white; margin: 15px 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .hora-bloque { background: rgba(255,255,255,0.2); border-radius: 12px; margin: 0 15px 20px 15px; padding: 10px; border: 1px solid rgba(255,255,255,0.3); }
        .hora-label { text-align: center; font-size: 0.8rem; font-weight: 800; color: var(--secondary); margin-bottom: 10px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 8px; }

        .match-card { margin: 8px 0; padding: 15px; background: rgba(255, 255, 255, 0.75); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .vitrina-card { padding: 20px; transform: scale(1.02); background: rgba(255, 255, 255, 0.9); }
        .match-card:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .teams-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .team-name { font-weight: 700; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .vitrina-card .team-name { font-size: 1.2rem; }
        .local-name { text-align: right; flex: 1; }
        .visitante-name { text-align: left; flex: 1; }
        .center-flags { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
        .team-logo { line-height: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); width: 30px; text-align: center; }
        .vitrina-card .team-logo { font-size: 2.2rem; }
        .score-box { padding: 4px 10px; font-weight: 800; color: var(--primary); background: white; border-radius: 20px; border: 2px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); min-width: 45px; text-align: center; }
        .vitrina-card .score-box { font-size: 1.2rem; padding: 8px 15px; }
        .match-details { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.65rem; color: #666; padding: 0 5px; }
        .match-status { font-weight: 700; color: var(--accent); text-transform: uppercase; font-size: 0.6rem; margin-top: 6px; text-align: center; letter-spacing: 1px; }

        .resto-fixture { display: block; }
        .grupo-titulo { margin: 15px 20px 5px 20px; padding: 8px 15px; font-weight: 800; color: var(--primary); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; background: rgba(255,255,255,0.5); border-radius: 8px; border-left: 4px solid var(--primary); }
        .grupo-titulo.eliminacion { background: var(--primary); color: white; text-align: center; border-left: none; border-radius: 12px; }
        .fixture-small .match-card { margin: 6px 15px; }
        .fixture-small .team-name { font-size: 0.85rem; }
        .fixture-small .team-logo { font-size: 1.2rem; }
        .fixture-small .score-box { font-size: 0.75rem; min-width: 35px; }

        .fab-share { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 28px; box-shadow: 0 6px 20px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000; transition: transform 0.3s; display: flex; align-items: center; justify-content: center; }
        .fab-share:hover { transform: scale(1.1) rotate(10deg); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-contenido { background: white; padding: 30px; border-radius: 24px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 320px; width: 90%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-contenido h3 { margin-bottom: 15px; color: #333; }
        #qr-container { display: flex; justify-content: center; margin-bottom: 15px; }
        .btn-cerrar-modal { background: #eee; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <img src="logo_lab_26.png" alt="LAB 26 Logo" class="app-logo">
            <p>Hora Bolivia · Diseño Exclusivo</p>
            <div class="outfit-selector">
                <label for="color-picker">Vísteme con:</label>
                <select id="color-picker" class="select-outfit" onchange="aplicarOutfit(this.value)">
                    <option value="default">🏆 FIFA Oficial</option>
                    <option value="argentina">🇦🇷 Argentina</option>
                    <option value="mexico">🇲🇽 México</option>
                    <option value="brasil">🇧🇷 Brasil</option>
                    <option value="uruguay">🇺🇾 Uruguay</option>
                    <option value="espana">🇪🇸 España</option>
                    <option value="portugal">🇵🇹 Portugal</option>
                    <option value="holanda">🇳🇱 Holanda</option>
                    <option value="alemania">🇩🇪 Alemania</option>
                    <option value="francia">🇫🇷 Francia</option>
                    <option value="croacia">🇭🇷 Croacia</option>
                    <option value="usa">🇺🇸 Estados Unidos</option>
                </select>
            </div>
        </div>

        <div class="matches-container">
            <div id="vitrina-container"></div>
            <div id="resto-container" class="resto-fixture"></div>
        </div>
    </div>

    <button class="fab-share" onclick="abrirModal()">📲</button>

    <div class="modal-overlay" id="modal-qr" onclick="cerrarModal(event)">
        <div class="modal-contenido">
            <h3>¡Compartí LAB 26!</h3>
            <p style="font-size:0.8rem; color:#666; margin-bottom:10px;">Escaneá para entrar desde tu celular</p>
            <div id="qr-container"></div>
            <button class="btn-cerrar-modal" onclick="document.getElementById('modal-qr').style.display='none'">Cerrar</button>
        </div>
    </div>

    <script>
    const disenos = {
        default:   { p: '#1a237e', s: '#ffffff', a: '#d32f2f', bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' },
        argentina: { p: '#1A5276', s: '#ffffff', a: '#ffffff', bg: 'linear-gradient(135deg, #56CCF2 0%, #2F80ED 100%)' },
        mexico:    { p: '#006341', s: '#ffffff', a: '#ce1126', bg: 'linear-gradient(135deg, #006341 0%, #00843D 100%)' },
        brasil:    { p: '#009c3b', s: '#ffffff', a: '#002776', bg: 'linear-gradient(135deg, #FFDF00 0%, #009c3b 100%)' },
        uruguay:   { p: '#5CBEFF', s: '#ffffff', a: '#001489', bg: 'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)' },
        espana:    { p: '#FFC400', s: '#ffffff', a: '#FFC400', bg: 'linear-gradient(135deg, #8B0000 0%, #C60B1E 100%)' },
        portugal:  { p: '#006600', s: '#ffffff', a: '#ff0000', bg: 'linear-gradient(135deg, #134E5E 0%, #71B280 100%)' },
        holanda:   { p: '#FF6600', s: '#ffffff', a: '#FF6600', bg: 'linear-gradient(135deg, #FFB347 0%, #FF6600 100%)' }, 
        alemania:  { p: '#000000', s: '#ffffff', a: '#dd0000', bg: 'linear-gradient(135deg, #434343 0%, #000000 100%)' },
        francia:   { p: '#002395', s: '#ffffff', a: '#ed2939', bg: 'linear-gradient(135deg, #00154F 0%, #0052D4 100%)' },
        croacia:   { p: '#D62828', s: '#ffffff', a: '#D62828', bg: 'linear-gradient(135deg, #8B0000 0%, #D62828 100%)' },
        usa:       { p: '#3c3b6e', s: '#ffffff', a: '#b22234', bg: 'linear-gradient(135deg, #4b6cb7 0%, #182848 100%)' }
    };

    function aplicarOutfit(equipo) {
        const e = disenos[equipo]; if (!e) return;
        const r = document.documentElement;
        r.style.setProperty('--primary', e.p); r.style.setProperty('--secondary', e.s);
        r.style.setProperty('--accent', e.a); r.style.setProperty('--bg-gradient', e.bg);
        localStorage.setItem('outfit_mundial', equipo);
    }

    function abrirModal() {
        const modal = document.getElementById('modal-qr');
        modal.style.display = 'flex';
        if(!document.getElementById('qr-img')) {
            new QRCode(document.getElementById("qr-container"), { text: window.location.href, width: 180, height: 180, colorDark : "#000000", colorLight : "#ffffff", correctLevel: QRCode.CorrectLevel.H });
        }
    }
    function cerrarModal(event) { if (event.target === event.currentTarget) event.target.style.display = 'none'; }

    let datosCargados = [];      // El que se muestra en pantalla (ordenado por fecha)
    let datosAgrupados = {};    // El cerebro que guarda quiénes son los rivales de cada grupo (para las tablas)
    
    async function iniciarApp() {
        const outfitGuardado = localStorage.getItem('outfit_mundial');
        if (outfitGuardado) { document.getElementById('color-picker'). value = outFitGuardado; aplicarOutfit(outfitGuardado); }

        try {
            const idHoja = "PEGA_TU_LINK_AQUI";
            const res = await fetch(idHoja);
            const textoCSV = await res.text();
            
            const lineas = textoCSV.trim().split('\n');
            let datosPlanos = [];
            
            for (let i = 1; i < lineas.length; i++) {
                const cols = lineas[i].split('\t');
                const fase = (cols[0] || "").trim();
                const local = (cols[1] || "").trim();
                const bl = (cols[2 || "").trim();
                const visitante = (cols[3] || "").trim();
                const bv = (cols[4 || "").trim();
                const fecha = (cols[5 || "").trim();
                const estadio = (cols[6 || "").trim();
                const glRaw = (cols[7 || "").trim();
                const gvRaw = (cols[8 || "").trim();
                const gl = glRaw === "" ? null : parseInt(glRaw);
                const gv = gvRaw === "" ? null : parseInt(gvRaw);

                if(local !== "" && visitante !== "") {
                    datosPlanos.push({
                        fase: fase, local: local, bl: bl, visitante: visitante,
                        bv: bv, fecha: fecha, estadio: estadio, gl: isNaN(gl) ? null : gl, gv: isNaN(gv) ? null : gv
                    });
                }
            }

            // EL CEREBRO DUAL: Aplanamos todo para ordenarlo por fecha...
            let todosLosPartidos = []; 
            datosPlanos.forEach(p => { if(p.local !== "") todosLosPartidos.push({...p}); });
            todosLosPartidos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

            // ...pero también guardamos los grupos originales para calcular las tablas...
            datosAgrupados = {};
            datosPlanos.forEach(p => {
                if(!datosAgrupados[p.fase]) datosAgrupados[p.fase] = [];
                datosAgrupados[p.fase].push(p);
            });

            // Reconstruimos la estructura de la app: Creamos bloques que se abren y se cierran según la fase
            datosCargados = [];
            let faseActual = "";
            
            todosLosPartidos.forEach(p => {
                if(p.fase !== faseActual) {
                    if(faseActual !== "") { 
                        // Cerramos el bloque del grupo anterior
                        contenedor = document.getElementById('resto-container');
                        contenedor.innerHTML += '</div></div>'; 
                    }
                    // Abrimos el nuevo bloque con su título
                    const claseTitulo = p.fase.includes("OCTAVOS") || p.fase.includes("CUARTOS") || p.fase.includes("SEMI") || p.fase.includes("FINAL") ? 'grupo-titulo eliminacion' : 'grupo-titulo';
                    contenedor = document.getElementById('resto-container');
                    contenedor.innerHTML += `<div class="${claseTitulo}">${p.fase}</div>`;
                    
                    // CALCULAMOS E INSERTAMOS LA TABLA DE POSICIONES (Solo en la fase de grupos)
                    if(!p.fase.includes("OCTAVOS") && !p.fase.includes("CUARTOS")) {
                        const grupoParaTabla = datosAgrupados[p.fase];
                        if(grupoParaTabla) {
                            const tablaCalculada = calcularTabla(grupoParaTabla.partidos);
                            contenedor.innerHTML += generarHTMLTabla(tablaCalculada);
                        }
                    }

                    // Abrimos el contenedor de partidos
                    contenedor.innerHTML += '<div class="fixture-small">';
                    faseActual = p.fase; // Recordamos que estamos en este grupo
                }

                // Dibujamos el partido
                contenedor.innerHTML += generarHTMLTarjeta(p, false);
            });
            
            // Cerramos el último bloque abierto
            if(faseActual !== "") { contenedor.innerHTML += '</div></div>'; }

            procesarVitrina();
            document.getElementById('resto-container').innerHTML = contenedor.innerHTML; // Inyectamos todo de golpe

        } catch (error) {
            document.getElementById('vitrina-container').innerHTML = '<div class="vitrina-titulo">⚠️ Error de lectura</div>';
            document.getElementById('resto-container').innerHTML = '<p style="text-align:center;padding:20px;color:white;">No se pudo leer el Excel.</p>';
            return;
        }
    }

    // MATEMÁTICA DE FÚTBOL: Sumamos goles y calculamos diferencia
    function calcularTabla(partidosGrupo) {
        let tabla = {};
        
        partidosGrupo.forEach(p => {
            if(p.gl === null) return; // Si no se jugó, no lo contamos
            if (!tabla[p.local]) tabla[p.local] = { pj: 0, pts: 0, gf: 0, gc: 0, dg: 0 };
            if (!tabla[p.visitante]) tabla[p.visitante] = { pj:0, pts:0, gf:0, gc:0, dg:0 };

            // Partidos Jugados
            tabla[p.local].pj++;
            tabla[p.visitante].pj++;
            
            // Goles a favor y en contra
            tabla[p.local].gf += p.gl; tabla[p.local].gc += p.gv; tabla[p.local].dg += (p.gv - p.gl);
            tabla[p.visitante].gf += p.gv; tabla[p.visitante].gc += p.gl; tabla[p.visitante].dg += (p.gl - p.gv);

            // Lógica de Puntos (3 por victoria, 1 por empate)
            if (p.gl > p.gv) { tabla[p.local].pts += 3; }
            else if (p.gl < p.gv) { tabla[p.visitante].pts += 3; }
            else { tabla[p.local].pts += 1; tabla[p.visitante].pts += 1; }
        });

        // Convertimos el objeto en un Array para poder ordenarlo
        let arrayTabla = Object.entries(tabla).map(([equipo, stats]) => ({equipo, ...stats}));
        arrayTabla.sort((a, b) => {
            if (b.pts !== a.pts) return b. - a.pts;       // 1. Por Puntos
            if (b.dg !== a.dg) return b.dg - a.dg;             // 2. Por Diferencia de Goles
            if (b.gf !== a.gf) return b.gf - a.gf;             // 3. Por Goles a Favor
            return a.pj - b.pj;                             // 4. Partidos Jugados
        });

        return arrayTabla;
    }

    // Generador de HTML de la tabla (Con estética de alta costura)
    function generarHTMLTabla(arrayTabla) {
        if(!arrayTabla || arrayTabla.length === 0) return "";
        
        let faseActualReal = faseActual; // Usamos la variable global para encontrar las banderas reales
        
        let html = `
            <div class="tabla-posiciones">
            <table>
                <thead>
                    <tr><th>#</th><th>Equipo</th><th>PJ</th><th>PTS</th><th>DG</th><th>GF</th><th>GC</th></tr>
                </thead>
                <tbody>`;
        
        arrayTabla.forEach((fila, index) => {
            // Buscamos la bandera del equipo en los datos reales del grupo para decorarlo
            let banderaLocal = ""; // Por defecto sin bandera
            if(faseActualReal) {
                let partidoEncontrado = faseActualReal.partidos.find(p => p.local === fila.equipo || p.visitante === fila.equipo);
                if(partidoEncontrado) {
                    banderaLocal = partidoEncontrado.local === fila.equipo ? partidoEncontrado.bl : partidoEncontrado.bv;
                }
            }
            
            // Si está en el Top 2, lo destacamos con un fondo verde
            const claseClasificado = index < 2 ? ' class="clasificado"' : '';
            
            html += `
                <tr${claseClasificado}>
                    <td>${index + 1}</td>
                    <td style="text-align:left; padding-left:10px;">${banderaLocal} ${fila.equipo}</td>
                    <td>${fila.pj}</td>
                    <td style="font-weight:800; color: var(--primary);">${fila.pts}</td>
                    <td>${fila.dg}</td>
                    <td>${fila.gf}</td>
                    <td>${fila.gc}</td>
                </tr>`;
        });
        
        html += `</tbody></table></div>`;
        return html;
    }

    function procesarVitrina() {
        const contenedor = document.getElementById('vitrina-container');
        let proximoPartido = null;

        for (let fase of datosCargados) {
            for (let p of fase.partidos) {
                if (p.gl === null && p.gv === null) { proximoPartido = p; break; }
            }
            if (proximoPartido) break;
        }

        if (!proximoPartido) {
            contenedor.innerHTML = '<div class="vitrina-titulo">🏆 El Mundial ha finalizado</div>';
            return;
        }

        contenedor.innerHTML = `
            <div class="vitrina-titulo">🔥 Próximo Partido</div>
            <div class="hora-bloque">
                <div class="hora-label">Actualizado en vivo</div>
                ${generarHTMLTarjeta(proximoPartido, true)}
            </div>`;
    }

    function generarHTMLTarjeta(p, esVitrina) {
        let marcador = "VS", estado = "Por jugar";
        if (p.gl !== null && p.gv !== null) { marcador = `${p.gl} - ${p.gv}`; estado = "Finalizado"; }
        
        const fecha = new Date(p.fecha).toLocaleString('es-ES', { timeZone: 'America/La_Paz', weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
        const claseTarjeta = esVitrina ? 'match-card vitrina-card' : 'match-card';

        return `
            <div class="${claseTarjeta}">
                <div class="teams-row">
                    <div class="team-name local-name">${p.local}</div>
                    <div class="center-flags">
                        <span class="team-logo">${p.bl}</span>
                        <div class="score-box">${marcador}</div>
                        <span class="team-logo">${p.bv}</span>
                    </div>
                    <div class="team-name visitante-name">${p.visitante}</div>
                </div>
                <div class="match-details">
                    <span>📅 ${fecha}hs</span>
                    <span>🏟️ ${p.estadio}</span>
                </div>
                <div class="match-status">${estado}</div>
            </div>`;
    }

    window.onload = iniciarApp;
</script>

<style>
    /* NUEVO CSS PARA LA TABLA */
    .tabla-posiciones {
        margin: 15px 15px; 
        padding: 10px;
        background: rgba(255,255,255,0.7); 
        border-radius: 10px;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .tabla-posiciones table { 
        width: 100%; 
        border-collapse: collapse; 
        text-align: center; 
        font-size: 0.85rem; 
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.5px;
    }
    .tabla-posciones th, .tabla-posiciones td { 
        padding: 6px 4px; 
        border-bottom: 1px solid #e0e0e0;
    }
    .tabla-posiciones th { 
        background: var(--primary); 
        color: var(--secondary); 
        font-size: 0.75rem; 
        text-transform: uppercase; 
        font-weight: 800;
        border-bottom: 2px solid var(--primary);
    }
    .tabla-posiciones .clasificado { 
        background: rgba(46, 204, 113, 0.2); 
    }
    .tabla-posiciones td:nth-child(2) { text-align: left; padding-left: 10px; }
</style>
    </script>
</body>
</html>
