<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture Mundial 2026</title>
    <style>
        :root {
            --primary: #1a237e;
            --secondary: #ffffff;
            --accent: #d32f2f;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-main: #222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 15px;
            transition: background 0.5s ease;
        }
        .app-container { max-width: 600px; margin: 0 auto; }
        .header {
            background-color: var(--primary);
            color: var(--secondary);
            padding: 25px 20px;
            border-radius: 16px 16px 0 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; opacity: 0.9; }
        .outfit-selector { margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        .outfit-selector label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .select-outfit {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; outline: none;
        }
        .select-outfit option { color: #333; background: white; }
        .matches-container {
            background: white; border-radius: 0 0 16px 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 20px;
        }
        .grupo-titulo {
            background: #f0f2f5; padding: 12px 20px; font-weight: 800; color: var(--primary); font-size: 0.95rem; 
            letter-spacing: 1px; border-bottom: 2px solid var(--primary); margin-top: 15px;
        }
        .grupo-titulo:first-child { margin-top: 0; }
        .grupo-titulo.eliminacion { background: var(--primary); color: white; text-align: center; font-size: 1.1rem; border-bottom: none; }
        .match-card { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; transition: transform 0.2s; }
        .match-card:last-child { border-bottom: none; }
        .match-card:hover { background-color: #fafafa; transform: scale(1.005); }
        .teams-row { display: flex; justify-content: space-between; align-items: center; }
        .team-info { display: flex; align-items: center; gap: 10px; width: 42%; }
        .team-info.local { flex-direction: row-reverse; text-align: right; }
        .team-info.visitante { text-align: left; }
        .team-name { font-weight: 600; font-size: 0.95rem; line-height: 1.2; }
        .team-logo { font-size: 1.8rem; line-height: 1; }
        .score-box {
            width: 16%; text-align: center; font-size: 1.1rem; font-weight: 800; color: var(--primary);
            background: #f8f9fa; padding: 8px 5px; border-radius: 8px; border: 2px solid var(--primary);
        }
        .match-details { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.7rem; color: #777; padding: 0 5px; }
        .match-status { font-weight: bold; color: var(--accent); text-transform: uppercase; font-size: 0.7rem; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

        <div class="header">
            <h1>🇺🇸 🇲🇽 🇨🇦 Mundial 2026</h1>
            <p>Fixture Oficial - 48 Equipos Clasificados</p>
            <div class="outfit-selector">
                <label for="color-picker">Vísteme con:</label>
                <select id="color-picker" class="select-outfit" onchange="aplicarOutfit(this.value)">

                    <option value="argentina">🇦🇷 Argentina</option>
                    <option value="mexico">🇲🇽 México</option>
                    <option value="brasil">🇧🇷 Brasil</option>

                    <option value="espana">🇪🇸 España</option>

                    <option value="holanda">🇳🇱 Holanda</option>
                    <option value="alemania">🇩🇪 Alemania</option>
                    <option value="francia">🇫🇷 Francia</option>
                    <option value="croacia">🇭🇷 Croacia</option>
                    <option value="inglaterra">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Inglaterra</option>

                </select>
            </div>
        </div>

        <div class="matches-container" id="matches">
            <!-- La magia se inyecta aquí -->

    </div>

            ]},

            // --- FASE DE ELIMINACIÓN (Estructura base) ---

                { local: { nombre: "1° Grupo C", bandera: "🥇" }, visitante: { nombre: "2° Grupo D", bandera: "🥈" }, fecha: "2026-07-04T21:00:00Z", estadio: "MetLife Stadium, Nueva York" },

        // ==========================================

            argentina: { p: '#74acdf', s: '#ffffff', a: '#74acdf', bg: 'linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%)' },

            portugal:  { p: '#006600', s: '#ffffff', a: '#ff0000', bg: 'linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%)' },
            holanda:   { p: '#FF6600', s: '#ffffff', a: '#FF6600', bg: 'linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%)' },
            alemania:  { p: '#000000', s: '#ffffff', a: '#dd0000', bg: 'linear-gradient(135deg, #eceff1 0%, #cfd8dc 100%)' },
            francia:   { p: '#002395', s: '#ffffff', a: '#ed2939', bg: 'linear-gradient(135deg, #e8eaf6 0%, #9fa8da 100%)' },
            croacia:   { p: '#D62828', s: '#ffffff', a: '#003DA5', bg: 'linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%)' },
            inglaterra:{ p: '#ffffff', s: '#cf081f', a: '#cf081f', bg: 'linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%)' },
            usa:       { p: '#3c3b6e', s: '#ffffff', a: '#b22234', bg: 'linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%)' }
        };

        function aplicarOutfit(equipo) {
            const estilo = disenos[equipo];
            if (!estilo) return;
            const root = document.documentElement;
            root.style.setProperty('--primary', estilo.p);
            root.style.setProperty('--secondary', estilo.s);
            root.style.setProperty('--accent', estilo.a);
            root.style.setProperty('--bg-gradient', estilo.bg);
            localStorage.setItem('outfit_mundial', equipo);
        }

        // ==========================================
        // DIBUJAR EL FIXTURE EN PANTALLA
        // ==========================================
        function renderizarFixture() {
            const contenedor = document.getElementById('matches');
            let htmlTotal = '';

            fixtureOficial.forEach(grupo => {
                // Si es fase de eliminación, usa un estilo de título distinto
                const claseTitulo = grupo.esEliminacion ? 'grupo-titulo eliminacion' : 'grupo-titulo';
                htmlTotal += `<div class="${claseTitulo}">${grupo.grupo}</div>`;
                
                grupo.partidos.forEach(partido => {
                    const fechaFormateada = new Date(partido.fecha).toLocaleString('es-ES', { 
                        weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
                    });

                    htmlTotal += `
                        <div class="match-card">
                            <div class="teams-row">
                                <div class="team-info local">
                                    <span class="team-name">${partido.local.nombre}</span>
                                    <span class="team-logo">${partido.local.bandera}</span>
                                </div>
                                <div class="score-box">VS</div>
                                <div class="team-info visitante">
                                    <span class="team-logo">${partido.visitante.bandera}</span>
                                    <span class="team-name">${partido.visitante.nombre}</span>
                                </div>
                            </div>
                            <div class="match-details">
                                <span>${fechaFormateada}hs</span>
                                <span>${partido.estadio}</span>
                            </div>
                            <div class="match-status">Por jugar</div>
                        </div>
                    `;
                });
            });

            contenedor.innerHTML = htmlTotal;
        }

        // Iniciar la app al cargar
        window.onload = () => {
            const outfitGuardado = localStorage.getItem('outfit_mundial');
            if (outfitGuardado) {
                document.getElementById('color-picker').value = outfitGuardado;
                aplicarOutfit(outfitGuardado);
            }
            renderizarFixture();
        };
    </script>
</body>
</html>
